# Este es un ejemplo básico. Ajusta las rutas y puertos si son diferentes.
server {
    listen 80; # Nginx escuchará en el puerto 80 dentro del contenedor
    server_name _; # Acepta cualquier nombre de host (Coolify gestiona el dominio real)

    # Configuración para servir tu aplicación frontend
    root /usr/share/nginx/html; # Directorio donde el Dockerfile copia los archivos `dist`
    index index.html index.htm; # Archivo de índice de tu aplicación

    location / {
        try_files $uri $uri/ /index.html; # Muy importante para aplicaciones SPA (React, Vue, Angular)
        # Esto asegura que todas las rutas no encontradas se redirijan a index.html
        # permitiendo que tu router de frontend maneje las rutas.
    }

    # Configuración para hacer proxy a tu backend
    # Asume que tu API usa una ruta /api/, por ejemplo, joum.anacas.dev/api/usuarios
    location /api/ {
        proxy_pass http://backend:8000; # 'backend' es el nombre del servicio en docker-compose.yaml
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Si tu backend no tiene /api/ en sus rutas, puedes cambiar esto:
        # por ejemplo, si solo quieres que /users vaya a http://backend:8000/users
        # location /users { proxy_pass http://backend:8000/users; }
    }

    # Opcional: Manejo de errores
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}