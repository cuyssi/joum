version: '3.8'
services:
  backend:
    build:
      context: ./backend
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    restart: always
    entrypoint: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    restart: always
